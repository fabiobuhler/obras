<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gestão Obras</title>
    <script>
      const path = window.location.pathname;
      const repo = '/obras';
      const relativePath = path.startsWith(repo) ? path.slice(repo.length) : path;
      const target = repo + '/?redirect=' + encodeURIComponent(relativePath + window.location.search + window.location.hash);
      window.location.replace(target);
    </script>
  </head>
  <body>
    Redirecionando...
  </body>
</html>
